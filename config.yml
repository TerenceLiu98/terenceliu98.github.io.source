    - name: "[Blog]"
      url: /post
      weight: 1
    - name: "[Scientia]"
      url: /scientia
      weight: 2
    - name: "[Projects]"
      url: /projects
      weight: 3
    - name: "[Links]"
      url: /links
      weight: 4

params:
  brand: CKLAU's WEBSITE
  avatarURL: https://avatars-githubusercontent.webp.se/TerenceLiu98
  description: "特倫蘇 (Junjie Liu / CKLAU) 的個人網站——統計、機器學習研究筆記、論文與生活記錄。"
  author: Junjie LIU
  images:
    - https://avatars-githubusercontent.webp.se/TerenceLiu98
  beian: 粤ICP备2022102668号
