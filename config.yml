baseURL: 'https://blog.cklau.cc'
languageCode: 'en'
title: "特倫蘇的日與夜"
theme: ["hugo-simplecite", "cklau-hugo-theme"]
description: "特倫蘇 (Junjie Liu / CKLAU) 的個人網站——統計、機器學習研究筆記、論文與生活記錄。"
homepage: 'https://blog.cklau.cc'
enableRobotsTXT: true
